name: Build signed release AAB (Play Store)

# Requires 4 repository secrets (Settings -> Secrets -> Actions):
#   KEYSTORE_B64      - your keystore file, base64 encoded (base64 -w0 karkoon.keystore)
#   KEYSTORE_PASSWORD - keystore password
#   KEY_ALIAS         - key alias
#   KEY_PASSWORD      - key password
# Create a keystore once with:
#   keytool -genkey -v -keystore karkoon.keystore -alias karkoon -keyalg RSA -keysize 2048 -validity 10000

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: |
          npm install
          npm run build
          npx cap add android
      - name: Icons
        run: |
          if [ -f icon.png ]; then npm i -D @capacitor/assets && npx capacitor-assets generate --android --assetPath . || true; fi
      - name: Permissions
        run: |
          sed -i 's#<application#<uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <application#' android/app/src/main/AndroidManifest.xml
      - run: npx cap sync android
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/app/karkoon.keystore
      - name: Build signed AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/karkoon.keystore \
            -Pandroid.injected.signing.store.password='${{ secrets.KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.KEY_PASSWORD }}'
      - uses: actions/upload-artifact@v4
        with:
          name: Karkoon-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
